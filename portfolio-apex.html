</head>
<body class="selection:bg-dashboard-accent/30 selection:text-dashboard-accent">
    <nav class="fixed top-0 w-full z-50 border-b border-dashboard-border bg-dashboard-bg/80 backdrop-blur-md">

                </div>

                GS_PORTFOLIO_SYSTEM

<script>
    const JSON_FILE = 'resume-content.json';
    let RESUME_DATA = null;

    async function loadResume() {
        let data;
        try {
            const res = await fetch(JSON_FILE);
            if (!res.ok) throw new Error('fetch failed');
            data = await res.json();
        } catch (e) {
            console.error('Failed to load JSON, falling back to empty data or handling error', e);
            return;
        }
        RESUME_DATA = data;
        render(data);
    }

    function render(data) {
        renderHero(data.meta, data.summary);
        renderExperience(data.experience);
        renderSkills(data.skills);
        renderContact(data.meta);
        renderFooter(data.meta);
    }

    function renderHero(meta, summary) {
        document.getElementById('hero-content').innerHTML = `
            <span class="text-dashboard-accent font-mono text-xs tracking-[0.3em] uppercase mb-4 block">${meta.title}</span>
            <h1 class="text-5xl md:text-7xl font-bold tracking-tight mb-6 text-white">
                ${meta.name}
            </h1>
            <p class="text-xl md:text-2xl text-dashboard-muted max-w-2xl leading-relaxed font-light">
                ${summary}
            </p>
        `;

        document.getElementById('hero-image-container').innerHTML = `
            <img alt="${meta.name}" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida/ADBb0uj4C1dBFaXL_VS1Tv-ggBNs1CNcS4q0UBRZJRpf1v6wE8RpT3XqHhEFDSxqU6EY_zrS1soLKgXT4YFbxI9sT5_q7y-dM3qZO95fUTCLPrRFL0RGUznAgnMY3z65SpxIwqj8mDH5dVLqXoa4Mk8nHFyHTUVmuPNhCO7NbzVTrY778VDL7Ygl7rkketr6PU4kgXTzURtvQSP6cgjZ39kKOe8ggk78q1BnyXIDHeFDPX-UHYiQQKFyhM_oHHsdnyzft651zuWuAXOv4w"/>
            <div class="absolute inset-0 bg-dashboard-bg/10 group-hover:bg-transparent transition-colors"></div>
            <div class="absolute bottom-0 left-0 w-full p-6 bg-gradient-to-t from-dashboard-bg/90 to-transparent">
                <div class="flex justify-between items-end">
                    <div>
                        <div class="metric-value">20+</div>
                        <div class="text-[10px] uppercase tracking-tighter text-dashboard-muted font-mono">Years Exp.</div>
                    </div>
                    <div class="text-right">
                        <div class="text-xs font-mono text-dashboard-accent">${meta.location}</div>
                    </div>
                </div>
            </div>
        `;
    }

    function renderExperience(jobs) {
        const container = document.getElementById('experience-container');
        let html = '';
        jobs.slice(0, 3).forEach((job, index) => {
            const isLatest = index === 0;
            const borderClass = isLatest ? 'border-l-4 border-l-dashboard-accent' : '';
            const periodClass = isLatest ? 'text-dashboard-accent bg-dashboard-accent/10 px-2 py-1' : 'text-dashboard-muted';
            const titleClass = isLatest ? 'text-dashboard-accent' : 'text-dashboard-muted';

            // Extract keywords or use generic ones
            const keywords = isLatest ? ['Cloud-Scale', 'AI Ops'] :
                             (index === 1 ? ['Legacy Pivot', 'Microservices'] : ['Product Strategy', 'Leadership']);

            const keywordsHtml = keywords.map(k => `<span class="border border-dashboard-border px-2 py-1 text-[9px] font-mono text-dashboard-muted uppercase">${k}</span>`).join('');

            // Trim description for portfolio card view
            const desc = job.bullets[0].replace(/^##\s*/, '');

            html += `
                <div class="bg-dashboard-card border border-dashboard-border p-8 hover:bg-[#1c2128] transition-all ${borderClass}">
                    <div class="flex justify-between items-start mb-6">
                        <span class="font-mono text-[10px] ${periodClass}">${job.period.toUpperCase()}</span>
                    </div>
                    <h4 class="text-2xl font-bold text-white mb-1">${job.company}</h4>
                    <p class="${titleClass} font-mono text-xs uppercase tracking-widest mb-4">${job.title}</p>
                    <p class="text-sm text-dashboard-muted leading-relaxed mb-6 line-clamp-4">${desc}</p>
                    <div class="flex flex-wrap gap-2">
                        ${keywordsHtml}
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    function renderSkills(skills) {
        const container = document.getElementById('skills-container');
        const icons = ['leaderboard', 'neurology', 'transform', 'rocket_launch', 'account_balance'];
        const metrics = ['98th PCTL', 'GEN_AI_READY', '400% VELOCITY', 'ALPHA_ADOPTER', 'SEC_COMPLIANT'];
        const values = ['95%', '90%', '85%', '92%', '88%'];

        let html = '';
        skills.slice(0, 5).forEach((skill, index) => {
            const isHighlight = index === 1;
            const bgClass = isHighlight ? 'bg-dashboard-accent/5 border-dashboard-accent/20' : '';
            const icon = icons[index % icons.length];
            const metric = metrics[index % metrics.length];
            const value = values[index % values.length];
            const desc = skill.items.join(', ');

            html += `
                <div class="stat-card ${bgClass}">
                    <div class="flex items-start justify-between mb-4">
                        <span class="material-symbols-outlined text-dashboard-accent" data-icon="${icon}">${icon}</span>
                        <div class="text-[10px] font-mono text-dashboard-accent">${metric}</div>
                    </div>
                    <h4 class="text-lg font-bold text-white mb-2 uppercase tracking-tight">${skill.category}</h4>
                    <p class="text-xs text-dashboard-muted leading-relaxed line-clamp-3">${desc}</p>
                    <div class="mt-4 h-1 w-full bg-dashboard-border rounded-full overflow-hidden">
                        <div class="bg-dashboard-accent h-full" style="width: ${value};"></div>
                    </div>
                </div>
            `;
        });

        // Add reliability card
        html += `
            <div class="stat-card flex flex-col justify-center items-center bg-dashboard-accent text-dashboard-bg">
                <div class="text-4xl font-black font-mono">100%</div>
                <div class="text-[10px] uppercase font-bold tracking-widest mt-2">Uptime Reliability</div>
            </div>
        `;

        container.innerHTML = html;
    }

    function renderContact(meta) {
        document.getElementById('contact-container').innerHTML = `
            <div class="flex items-center gap-4 group">
                <div class="w-10 h-10 border border-dashboard-border flex items-center justify-center text-dashboard-accent group-hover:bg-dashboard-accent group-hover:text-dashboard-bg transition-all">
                    <span class="material-symbols-outlined text-sm" data-icon="mail">mail</span>
                </div>
                <span class="text-sm text-dashboard-muted group-hover:text-white transition-colors"><a href="mailto:${meta.email}">${meta.email}</a></span>
            </div>
            <div class="flex items-center gap-4 group">
                <div class="w-10 h-10 border border-dashboard-border flex items-center justify-center text-dashboard-accent group-hover:bg-dashboard-accent group-hover:text-dashboard-bg transition-all">
                    <span class="material-symbols-outlined text-sm" data-icon="location_on">location_on</span>
                </div>
                <span class="text-sm text-dashboard-muted group-hover:text-white transition-colors">${meta.location}</span>
            </div>
        `;
    }

    function renderFooter(meta) {
        document.getElementById('footer-links').innerHTML = `
            <a class="font-mono text-[10px] uppercase tracking-widest text-dashboard-muted hover:text-dashboard-accent transition-colors" href="${meta.linkedinUrl}" target="_blank">LinkedIn</a>
            <a class="font-mono text-[10px] uppercase tracking-widest text-dashboard-muted hover:text-dashboard-accent transition-colors" href="mailto:${meta.email}">Email</a>
            <button onclick="downloadPDF()" class="font-mono text-[10px] uppercase tracking-widest text-dashboard-muted hover:text-dashboard-accent transition-colors cursor-pointer bg-transparent border-none p-0 m-0">Download_CV</button>
        `;
    }

    // Call loadResume on page load
    document.addEventListener('DOMContentLoaded', loadResume);

</script>
<script>
    const THEMES = {
      carbon: {
        name: 'Carbon Edge',
        attr: 'carbon',
        fonts: 'https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap',
        colors: { INK: '#111827', INKL: '#374151', INKM: '#6b7280', ACC: '#0d7490', RULE: '#4b5563', JOBRULE: '#d1d5db' }
      },
      executive: {
        name: 'Executive Edge',
        attr: 'executive',
        fonts: 'https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,600;0,700;1,400&display=swap',
        colors: { INK: '#0f1923', INKL: '#374151', INKM: '#6b7280', ACC: '#1e3a5f', RULE: '#94a3b8', JOBRULE: '#d1d9e0' }
      },
      editorial: {
        name: 'Warm Editorial',
        attr: 'editorial',
        fonts: 'https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap',
        colors: { INK: '#1a1a1a', INKL: '#4a4a4a', INKM: '#888888', ACC: '#8b6f47', RULE: '#c8b99a', JOBRULE: '#e8e0d0' }
      },
      meridian: {
        name: 'Meridian Dark',
        attr: 'meridian',
        fonts: 'https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;600&display=swap',
        colors: { INK: '#e6edf3', INKL: '#c9d1d9', INKM: '#8b949e', ACC: '#58a6ff', RULE: '#30363d', JOBRULE: '#21262d' }
      },
      blueprint: {
        name: 'Blueprint',
        attr: 'blueprint',
        fonts: 'https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600&display=swap',
        colors: { INK: '#0f172a', INKL: '#1e3a5f', INKM: '#64748b', ACC: '#2563eb', RULE: '#bfdbfe', JOBRULE: '#eff6ff' }
      }
    };

    let currentTheme = 'carbon';

    function downloadPDF() {
      if (!RESUME_DATA) return;
      const d = RESUME_DATA;
      // Change button text briefly to show loading state if desired

      try {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ unit: 'pt', format: 'a4' });

        const PW = 595.28, PH = 841.89;
        const ML = 36, MR = 36, MT = 40, MB = 36;
        const LBL_W = 90, GAP = 14;
        const BODY_X = ML + LBL_W + GAP;
        const BODY_W = PW - MR - BODY_X;
        const CAT_COL = 130;

        const h2r = h => [parseInt(h.slice(1, 3), 16), parseInt(h.slice(3, 5), 16), parseInt(h.slice(5, 7), 16)];
        const tc = h => doc.setTextColor(...h2r(h));
        const dc = h => doc.setDrawColor(...h2r(h));
        const { INK, INKL, INKM, ACC, RULE, JOBRULE } = THEMES[currentTheme].colors;

        let y = MT;

        const newPage = () => { doc.addPage(); y = MT; };
        const need = (h) => { if (y + h > PH - MB) newPage(); };

        const lbl = (text) => {
          doc.setFont('helvetica', 'bold'); doc.setFontSize(7); tc(ACC);
          doc.text(text.toUpperCase(), ML + LBL_W, y + 7, { align: 'right' });
          dc(RULE); doc.setLineWidth(0.4);
          doc.line(ML + LBL_W - 22, y + 10, ML + LBL_W, y + 10);
        };

        // HEADER
        doc.setFont('times', 'bold'); doc.setFontSize(30); tc(INK);
        doc.text(d.meta.name, ML, y + 28);

        doc.setFont('helvetica', 'bold'); doc.setFontSize(7.5); tc(ACC);
        doc.text(d.meta.title, ML, y + 42);

        doc.setFont('helvetica', 'normal'); doc.setFontSize(9); tc(INKL);
        [d.meta.email, d.meta.phone, d.meta.location, d.meta.linkedin].forEach((v, i) => {
          doc.text(v, PW - MR, y + 10 + i * 12.5, { align: 'right' });
        });
        y += 54;
        dc(RULE); doc.setLineWidth(1.5); doc.line(ML, y, PW - MR, y);
        y += 18;

        // PROFILE
        lbl('Profile');
        doc.setFont('helvetica', 'italic'); doc.setFontSize(9); tc(INKL);
        doc.splitTextToSize(d.summary, BODY_W).forEach(line => {
          doc.text(line, BODY_X, y + 9); y += 13;
        });
        y += 14;

        // EXPERIENCE
        need(60); lbl('Experience');
        d.experience.forEach((job, idx) => {
          if (idx > 0) {
            need(50);
            dc(JOBRULE); doc.setLineDashPattern([1.5, 1.5], 0); doc.setLineWidth(0.4);
            doc.line(BODY_X, y, PW - MR, y); doc.setLineDashPattern([], 0);
            y += 10;
          }

          doc.setFont('times', 'bold'); doc.setFontSize(13); tc(INK);
          doc.text(job.company, BODY_X, y + 10);
          doc.setFont('helvetica', 'normal'); doc.setFontSize(8.5); tc(INKM);
          doc.text(job.period, PW - MR, y + 10, { align: 'right' });
          y += 15;

          doc.setFont('helvetica', 'bold'); doc.setFontSize(7.5); tc(ACC);
          doc.text(job.title.toUpperCase(), BODY_X, y + 7);
          y += 13;

          doc.setFont('helvetica', 'normal'); doc.setFontSize(9); tc(INKL);
          job.bullets.forEach(b => {
            if (b.startsWith('##')) {
              y += 4;
              doc.setFont('helvetica', 'bold'); doc.setFontSize(7.5); tc(INK);
              doc.text(b.slice(2).trim().toUpperCase(), BODY_X, y + 7);
              y += 13;
              return;
            }
            doc.setFont('helvetica', 'normal'); doc.setFontSize(9); tc(INKL);
            const lines = doc.splitTextToSize(b, BODY_W - 14);
            need(lines.length * 13 + 3);
            tc(RULE); doc.text('—', BODY_X, y + 9);
            tc(INKL);
            lines.forEach((l, li) => { doc.text(l, BODY_X + 14, y + 9 + li * 13); });
            y += lines.length * 13 + 3;
          });
          y += 8;
        });

        // SKILLS
        need(30); y += 4; lbl('Skills');
        d.skills.forEach(sg => {
          need(20);
          doc.setFont('helvetica', 'bold'); doc.setFontSize(7.5); tc(INKM);
          const catLines = doc.splitTextToSize(sg.category.toUpperCase(), CAT_COL);
          catLines.forEach((cl, ci) => { doc.text(cl, BODY_X, y + 8 + ci * 10); });

          doc.setFont('helvetica', 'normal'); doc.setFontSize(9); tc(INKL);
          const itemLines = doc.splitTextToSize(sg.items.join('  ·  '), BODY_W - CAT_COL - 6);
          itemLines.forEach((il, ii) => { doc.text(il, BODY_X + CAT_COL + 6, y + 8 + ii * 12); });

          y += Math.max(catLines.length * 10, itemLines.length * 12) + 6;
        });

        // EDUCATION
        if (d.education && d.education.length) {
          need(30); y += 4; lbl('Education');
          d.education.forEach(edu => {
            need(28);
            doc.setFont('helvetica', 'bold'); doc.setFontSize(7.5); tc(INKM);
            doc.text(edu.institution.toUpperCase(), BODY_X, y + 8);
            doc.setFont('helvetica', 'normal'); doc.setFontSize(9.5); tc(INKL);
            doc.text(`${edu.degree}  —  ${edu.location}, ${edu.year}`, BODY_X, y + 20);
            y += 30;
          });
        }

        // CERTIFICATIONS
        need(30); y += 4; lbl('Certifications');
        d.certifications.forEach(cert => {
          need(20);
          doc.setFont('helvetica', 'bold'); doc.setFontSize(7.5); tc(INKM);
          doc.text(cert.issuer.toUpperCase(), BODY_X, y + 8);
          y += 13;
          cert.items.forEach(item => {
            need(14);
            doc.setFont('helvetica', 'normal'); doc.setFontSize(9.5); tc(INKL);
            doc.text('·  ' + item, BODY_X + 4, y + 9);
            y += 13;
          });
          y += 6;
        });

        // AI PRACTITIONER
        if (d.aiPractitioner) {
          const ai = d.aiPractitioner;
          need(30); y += 4; lbl('AI Practice');
          if (ai.intro) {
            doc.setFont('helvetica', 'italic'); doc.setFontSize(9); tc(INKL);
            doc.splitTextToSize(ai.intro, BODY_W).forEach(line => {
              doc.text(line, BODY_X, y + 9); y += 13;
            });
            y += 6;
          }
          ai.bullets.forEach(b => {
            const colon = b.indexOf(':');
            const hasLabel = colon > 0 && colon < 35;
            const label = hasLabel ? b.slice(0, colon + 1) : '';
            const rest = hasLabel ? b.slice(colon + 1).trim() : b;
            doc.setFont('helvetica', 'normal'); doc.setFontSize(9); tc(INKL);
            const lines = doc.splitTextToSize((hasLabel ? rest : b), BODY_W - 14);
            need(lines.length * 13 + 3);
            tc(RULE); doc.text('—', BODY_X, y + 9);
            if (hasLabel) {
              doc.setFont('helvetica', 'bold'); tc(INK);
              doc.text(label, BODY_X + 14, y + 9);
              const lw = doc.getTextWidth(label) + 3;
              doc.setFont('helvetica', 'normal'); tc(INKL);
              const firstLineRest = doc.splitTextToSize(rest, BODY_W - 14 - lw);
              doc.text(firstLineRest[0], BODY_X + 14 + lw, y + 9);
              if (firstLineRest.length > 1) {
                firstLineRest.slice(1).forEach((l, li) => {
                  doc.text(l, BODY_X + 14, y + 9 + (li + 1) * 13);
                });
              }
              y += firstLineRest.length * 13 + 3;
            } else {
              lines.forEach((l, li) => { doc.text(l, BODY_X + 14, y + 9 + li * 13); });
              y += lines.length * 13 + 3;
            }
          });
        }

        doc.save('Guillermo_Salas_Resume.pdf');

      } catch (err) {
        console.error('PDF generation failed:', err);
        alert('PDF generation failed.');
      }
    }
</script>
