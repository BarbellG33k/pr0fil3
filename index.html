<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guillermo Salas - Technical Executive</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            color: #e5e5e5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 60px 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .card:hover {
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.4);
        }

        .moniker {
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #00d4ff;
            margin-bottom: 20px;
            opacity: 0.9;
        }

        .title {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #00d4ff, #00aaff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 16px;
            font-weight: 400;
            color: #888888;
            margin-bottom: 40px;
            letter-spacing: 1px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .github-icon {
            width: 18px;
            height: 18px;
            display: inline-block;
        }

        .divider {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00d4ff, transparent);
            margin: 30px auto;
        }

        .description {
            font-size: 14px;
            line-height: 1.8;
            color: #a0a0a0;
            margin-bottom: 40px;
            font-weight: 300;
        }

        .resume-link {
            display: inline-block;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            color: #1a1a1a;
            padding: 16px 48px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.2);
        }

        .resume-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(0, 212, 255, 0.4);
            background: linear-gradient(135deg, #00aaff, #0077ff);
        }

        .resume-link:active {
            transform: translateY(0);
        }

        .footer {
            margin-top: 50px;
            padding-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 12px;
            color: #707070;
            font-weight: 300;
        }

        .footer a {
            color: #00d4ff;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .footer a:hover {
            color: #00aaff;
        }

        @media (max-width: 600px) {
            .card {
                padding: 40px 25px;
            }

            .title {
                font-size: 36px;
            }

            .subtitle {
                font-size: 18px;
            }

            .description {
                font-size: 13px;
            }

            .resume-link {
                padding: 14px 40px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">

            <h1 class="title">Guillermo Salas</h1>

            <div class="divider"></div>

            <p class="description">
                Engineering leader building AI-augmented organizations. 20+ years scaling platforms across healthcare, fintech, and enterprise. Currently leading platform engineering at a Fortune 500 healthcare company.
            </p>

            <a href="resume.html" class="resume-link">View Full Resume</a>

            <div class="footer">
                <p>
                    <a href="https://www.linkedin.com/in/guillermosalas/" target="_blank">LinkedIn</a>

        </div>
    </div>
</body>
</html>
