<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guillermo Salas — Resume</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link id="gfonts-link"
    href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    /* ── Base = Carbon Edge (default) ── */
    :root {
      --heading-font: 'DM Serif Display', serif;
      --body-font: 'DM Sans', sans-serif;
      --ink: #111827;
      --ink-light: #374151;
      --ink-muted: #6b7280;
      --rule: #4b5563;
      --rule-subtle: #d1d5db;
      --accent: #0d7490;
      --accent-dark: #0a5a6e;
      --accent-light: #e0f2f7;
      --bg: #f9fafb;
      --page: #ffffff;
      --col-left: clamp(96px, 16%, 132px);
      --gap: 16px;
    }

    [data-theme="executive"] {
      --heading-font: 'Inter', sans-serif;
      --body-font: 'Inter', sans-serif;
      --ink: #0f1923;
      --ink-light: #374151;
      --ink-muted: #6b7280;
      --rule: #94a3b8;
      --rule-subtle: #d1d9e0;
      --accent: #1e3a5f;
      --accent-dark: #152b47;
      --accent-light: #e8eef5;
      --bg: #f1f5f9;
      --page: #ffffff;
    }

    [data-theme="editorial"] {
      --heading-font: 'Cormorant Garamond', serif;
      --body-font: 'DM Sans', sans-serif;
      --ink: #1a1a1a;
      --ink-light: #4a4a4a;
      --ink-muted: #888;
      --rule: #c8b99a;
      --rule-subtle: #e8e0d0;
      --accent: #8b6f47;
      --accent-dark: #7a5f3a;
      --accent-light: #f5f0e8;
      --bg: #fdfaf5;
      --page: #ffffff;
    }

    /* ── Meridian Dark ── */
    [data-theme="meridian"] {
      --heading-font: 'Space Grotesk', sans-serif;
      --body-font: 'Inter', sans-serif;
      --ink: #e6edf3;
      --ink-light: #c9d1d9;
      --ink-muted: #8b949e;
      --rule: #30363d;
      --rule-subtle: #21262d;
      --accent: #58a6ff;
      --accent-dark: #388bfd;
      --accent-light: #1a2d45;
      --bg: #010409;
      --page: #0d1117;
    }

    /* ── Blueprint ── */
    [data-theme="blueprint"] {
      --heading-font: 'Space Grotesk', sans-serif;
      --body-font: 'Outfit', sans-serif;
      --ink: #0f172a;
      --ink-light: #1e3a5f;
      --ink-muted: #64748b;
      --rule: #bfdbfe;
      --rule-subtle: #eff6ff;
      --accent: #2563eb;
      --accent-dark: #1d4ed8;
      --accent-light: #dbeafe;
      --bg: #f0f4ff;
      --page: #ffffff;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--bg);
      font-family: var(--body-font);
      color: var(--ink);
      font-size: 13px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      transition: background 0.25s, color 0.25s;
    }

    /* ── toolbar ── */
    #toolbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 48px;
      background: #0d1117;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 200;
      gap: 12px;
      border-bottom: 1px solid #21262d;
    }

    #toolbar-title {
      color: #8b949e;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-family: 'DM Sans', sans-serif;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex-shrink: 1;
      min-width: 0;
    }

    .toolbar-right {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
    }

    .toolbar-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      border: none;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--accent, #0d7490);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--accent-dark, #0a5a6e);
    }

    .btn-ghost {
      background: transparent;
      color: #8b949e;
      border: 1px solid #30363d;
    }

    .btn-ghost:hover {
      border-color: #8b949e;
      color: #e6edf3;
    }

    .btn-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 4px;
      border: 1px solid var(--rule-subtle, #30363d);
      background: transparent;
      color: var(--ink-muted, #6b7280);
      cursor: pointer;
      transition: all 0.2s;
      opacity: 0.4;
    }

    .btn-icon.active {
      opacity: 1;
      color: var(--accent, #0d7490);
      border-color: var(--accent, #0d7490);
      background: var(--accent-light, rgba(13, 116, 144, 0.1));
    }

    .btn-icon:hover {
      opacity: 1;
      border-color: var(--accent, #0d7490);
    }

    .owner-only {
      display: none;
    }

    body.owner-mode .owner-only {
      display: inline-flex;
    }

    .theme-select {
      background: #161b22;
      color: #8b949e;
      border: 1px solid #30363d;
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 5px 10px;
      border-radius: 2px;
      cursor: pointer;
      outline: none;
    }

    .theme-select:hover {
      border-color: #8b949e;
    }

    /* hamburger — mobile only */
    #menu-toggle {
      display: none;
      background: transparent;
      border: 1px solid #30363d;
      color: #8b949e;
      border-radius: 2px;
      padding: 4px 9px;
      cursor: pointer;
      font-size: 17px;
      line-height: 1;
    }

    /* mobile action drawer */
    #mobile-menu {
      display: none;
      position: fixed;
      top: 48px;
      left: 0;
      right: 0;
      background: #0d1117;
      border-bottom: 1px solid #21262d;
      padding: 12px 16px;
      z-index: 190;
      flex-direction: column;
      gap: 8px;
    }

    #mobile-menu.open {
      display: flex;
    }

    #mobile-menu .btn {
      width: 100%;
      justify-content: center;
      padding: 10px;
    }

    /* ── section nav (mobile sticky) ── */
    #section-nav {
      display: none;
      position: sticky;
      top: 48px;
      z-index: 150;
      background: var(--page);
      border-bottom: 1px solid var(--rule-subtle);
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      white-space: nowrap;
    }

    #section-nav::-webkit-scrollbar {
      display: none;
    }

    #section-nav a {
      display: inline-block;
      padding: 10px 14px;
      font-size: 10px;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      color: var(--ink-muted);
      text-decoration: none;
      border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }

    #section-nav a.active,
    #section-nav a:hover {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* ── page wrapper ── */
    #page-wrap {
      padding-top: 72px;
      padding-bottom: 48px;
      display: flex;
      justify-content: center;
    }

    /* ── resume sheet ── */
    #resume {
      background: var(--page);
      width: 794px;
      max-width: 100%;
      box-shadow: 0 4px 40px rgba(0, 0, 0, 0.10);
      padding: 44px 48px 52px;
      transition: background 0.25s;
    }

    /* ── header ── */
    #header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding-bottom: 18px;
      border-bottom: 2px solid var(--rule);
      margin-bottom: 26px;
    }

    #header-left h1 {
      font-family: var(--heading-font);
      font-size: 38px;
      font-weight: 600;
      letter-spacing: 0.01em;
      color: var(--ink);
      line-height: 1;
      margin-bottom: 6px;
    }

    #header-left .title-tag {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      font-family: 'DM Sans', sans-serif;
    }

    #header-right {
      text-align: right;
      font-size: 11.5px;
      color: var(--ink-light);
      line-height: 1.9;
    }

    #header-right a {
      color: var(--accent);
      text-decoration: none;
    }

    #header-right a:hover {
      text-decoration: underline;
    }

    /* ── section layout ── */
    .section {
      display: flex;
      margin-bottom: 20px;
    }

    .section-label {
      width: var(--col-left);
      flex-shrink: 0;
      padding-top: 2px;
      text-align: right;
    }

    .section-label h2 {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.20em;
      text-transform: uppercase;
      color: var(--accent);
      font-family: 'DM Sans', sans-serif;
      padding-top: 4px;
    }

    .section-divider {
      width: 32px;
      height: 1px;
      background: var(--rule);
      margin: 8px 0 0 auto;
    }

    .section-body {
      flex-grow: 1;
      border-left: 1px solid var(--rule);
      padding-left: var(--gap);
      margin-left: var(--gap);
    }

    /* ── summary ── */
    .summary-text {
      font-size: 12px;
      color: var(--ink-light);
      line-height: 1.55;
      font-style: italic;
    }

    /* ── experience ── */
    .job {
      margin-bottom: 14px;
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .job:last-child {
      margin-bottom: 0;
    }

    .job-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 2px;
    }

    .job-company {
      font-family: var(--heading-font);
      font-size: 16px;
      font-weight: 600;
      color: var(--ink);
      letter-spacing: 0.01em;
    }

    .job-period {
      font-size: 10.5px;
      color: var(--ink-muted);
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .job-title {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 5px;
    }

    .job-bullets {
      list-style: none;
      padding: 0;
    }

    .job-bullets li {
      position: relative;
      padding-left: 14px;
      margin-bottom: 2px;
      font-size: 11.5px;
      color: var(--ink-light);
      line-height: 1.5;
    }

    .job-bullets li::before {
      content: '—';
      position: absolute;
      left: 0;
      color: var(--rule);
      font-size: 11px;
      top: 1px;
    }

    .job-bullets li.bullet-heading {
      padding-left: 0;
      margin-top: 8px;
      margin-bottom: 3px;
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--ink);
      line-height: 1.4;
    }

    .job-bullets li.bullet-heading::before {
      content: '';
    }

    .practitioner-intro {
      font-size: 11.5px;
      color: var(--ink-light);
      font-style: italic;
      line-height: 1.55;
      margin-bottom: 8px;
    }

    .job+.job {
      padding-top: 12px;
      border-top: 1px dashed var(--rule-subtle);
    }

    .job-summary {
      display: block;
      list-style: none;
      margin-bottom: 5px;
    }

    .job-summary::-webkit-details-marker {
      display: none;
    }

    .job-summary::marker {
      content: '';
    }

    .job-summary:focus-visible {
      outline: 1px dashed var(--rule);
      outline-offset: 2px;
    }

    .job-summary .job-title {
      margin-bottom: 0;
      cursor: pointer;
    }

    .job-collapsible:not([open]) .job-summary {
      margin-bottom: 0;
    }

    .job-collapsible:not([open]) .job-bullets {
      display: none;
    }

    /* ── skills ── */
    .skills-grid {
      display: flex;
      flex-direction: column;
    }

    .skill-row {
      display: flex;
      align-items: baseline;
      margin-bottom: 10px;
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .skill-row:last-child {
      margin-bottom: 0px;
    }

    .skill-cat {
      width: 160px;
      flex-shrink: 0;
      margin-right: 12px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }

    .skill-items {
      display: flex;
      flex-wrap: wrap;
      margin: -2.5px;
    }

    .skill-chip {
      margin: 2.5px;
      font-size: 11px;
      padding: 2px 9px;
      background: var(--accent-light);
      color: var(--accent);
      border-radius: 2px;
      font-weight: 500;
      white-space: nowrap;
    }

    /* ── certifications ── */
    .cert-group {
      margin-bottom: 10px;
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .cert-group:last-child {
      margin-bottom: 0;
    }

    .cert-issuer {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-bottom: 3px;
    }

    .cert-items {
      list-style: none;
    }

    .cert-items li {
      font-size: 12px;
      color: var(--ink-light);
      padding-left: 12px;
      position: relative;
      line-height: 1.6;
    }

    .cert-items li::before {
      content: '·';
      position: absolute;
      left: 0;
      color: var(--accent);
      font-size: 16px;
      line-height: 1.2;
    }

    /* ── education ── */
    .edu-entry {
      margin-bottom: 8px;
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .edu-institution {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-bottom: 2px;
    }

    .edu-detail {
      font-size: 12px;
      color: var(--ink-light);
    }

    /* ── loading ── */
    #loading {
      text-align: center;
      padding: 80px;
      color: var(--ink-muted);
      font-size: 13px;
      letter-spacing: 0.08em;
    }

    /* ═══════════════════════════════════════════════════════════
       MERIDIAN DARK — layout overrides
    ═══════════════════════════════════════════════════════════ */

    [data-theme="meridian"] #resume {
      box-shadow: 0 4px 60px rgba(0, 0, 0, 0.6);
    }

    [data-theme="meridian"] #header {
      flex-direction: column;
      align-items: flex-start;
      gap: 12px;
      border-bottom-color: #30363d;
    }

    [data-theme="meridian"] #header-right {
      text-align: left;
      display: flex;
      flex-wrap: wrap;
      gap: 2px 20px;
      font-size: 11px;
    }

    [data-theme="meridian"] #header-left h1 {
      font-size: 34px;
      letter-spacing: -0.01em;
      font-weight: 700;
    }

    [data-theme="meridian"] .section-body {
      border-left-color: #30363d;
    }

    [data-theme="meridian"] .skill-chip {
      background: rgba(88, 166, 255, 0.08);
      border: 1px solid rgba(88, 166, 255, 0.28);
    }

    [data-theme="meridian"] .job+.job {
      border-top-color: #21262d;
    }

    [data-theme="meridian"] .job-bullets li::before {
      color: #30363d;
    }

    /* ═══════════════════════════════════════════════════════════
       BLUEPRINT — layout overrides (horizontal section headers)
    ═══════════════════════════════════════════════════════════ */

    [data-theme="blueprint"] .section {
      flex-direction: column;
      margin-bottom: 26px;
    }

    [data-theme="blueprint"] .section-label {
      width: 100%;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 12px;
      padding-bottom: 8px;
      margin-bottom: 14px;
      border-bottom: 2px solid var(--accent);
    }

    [data-theme="blueprint"] .section-label h2 {
      font-size: 10px;
      letter-spacing: 0.22em;
      padding-top: 0;
    }

    [data-theme="blueprint"] .section-divider {
      display: none;
    }

    [data-theme="blueprint"] .section-body {
      border-left: none;
      margin-left: 0;
      padding-left: 0;
    }

    [data-theme="blueprint"] .job {
      padding: 12px 14px;
      border: 1px solid var(--rule-subtle);
      border-left: 3px solid var(--rule-subtle);
      border-radius: 0 4px 4px 0;
      margin-bottom: 10px;
      transition: border-left-color 0.2s;
    }

    [data-theme="blueprint"] .job+.job {
      border-top: 1px solid var(--rule-subtle);
      padding-top: 12px;
    }

    [data-theme="blueprint"] .job:hover {
      border-left-color: var(--accent);
    }

    [data-theme="blueprint"] .skill-row {
      padding: 8px 0;
      border-bottom: 1px solid var(--rule-subtle);
      align-items: center;
    }

    [data-theme="blueprint"] .skill-row:last-child {
      border-bottom: none;
    }

    [data-theme="blueprint"] #header {
      padding-bottom: 20px;
      border-bottom-width: 3px;
    }

    [data-theme="blueprint"] #header-left h1 {
      font-size: 40px;
      letter-spacing: -0.02em;
    }

    [data-theme="blueprint"] .cert-group {
      padding: 10px 14px;
      border: 1px solid var(--rule-subtle);
      border-radius: 4px;
      margin-bottom: 8px;
    }

    /* ═══════════════════════════════════════════════════════════
       RESPONSIVE — tablet
    ═══════════════════════════════════════════════════════════ */

    @media (max-width: 860px) {
      #resume {
        width: 100%;
        padding: 32px 28px 40px;
      }
    }

    /* ═══════════════════════════════════════════════════════════
       RESPONSIVE — mobile
    ═══════════════════════════════════════════════════════════ */

    @media (max-width: 640px) {
      #toolbar {
        padding: 0 14px;
      }

      #toolbar-title {
        font-size: 10px;
      }

      .toolbar-actions {
        display: none;
      }

      #menu-toggle {
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      #section-nav {
        display: block;
      }

      #page-wrap {
        padding-top: 48px;
      }

      #resume {
        padding: 22px 16px 32px;
        box-shadow: none;
        border-radius: 0;
      }

      /* header stacks */
      #header {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }

      #header-right {
        text-align: left;
        display: flex;
        flex-wrap: wrap;
        gap: 2px 16px;
        font-size: 11px;
      }

      #header-left h1 {
        font-size: 28px;
      }

      /* sections: label becomes inline banner */
      .section {
        flex-direction: column;
      }

      .section-label {
        width: 100%;
        text-align: left;
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
      }

      .section-label h2 {
        padding-top: 0;
      }

      .section-divider {
        flex: 1;
        height: 1px;
        width: auto;
        margin: 0;
      }

      .section-body {
        border-left: none;
        margin-left: 0;
        padding-left: 0;
      }

      .skill-row {
        flex-direction: column;
        gap: 6px;
        align-items: flex-start;
      }

      .skill-cat {
        width: auto;
        margin-right: 0;
      }

      .job-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 1px;
      }

      .job-period {
        font-size: 10px;
      }

      .job-company {
        font-size: 14px;
      }

      .job-bullets li {
        font-size: 11px;
      }

      /* blueprint on mobile: undo card padding slightly */
      [data-theme="blueprint"] .job {
        padding: 10px 10px;
      }
    }

    /* ── print ── */
    @page {
      size: A4;
      margin: 14mm 12mm;
    }

    @media print {
      * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }

      #toolbar,
      #section-nav,
      #mobile-menu {
        display: none !important;
      }

      body {
        background: white !important;
        margin: 0;
        padding: 0;
      }

      #page-wrap {
        padding: 0 !important;
        margin: 0 !important;
        display: block !important;
      }

      #resume {
        box-shadow: none !important;
        width: 100% !important;
        padding: 0 !important;
        margin: 0 !important;
      }
    }
  </style>
</head>

<body>

  <div id="toolbar">
    <a href="index.html" style="color:#8b949e;text-decoration:none;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;font-family:'DM Sans',sans-serif;white-space:nowrap;transition:color 0.2s;" onmouseover="this.style.color='#e6edf3'" onmouseout="this.style.color='#8b949e'">← Back</a>
    <span id="toolbar-title">Guillermo Salas — Resume</span>
    <div class="toolbar-right">
      <select id="theme-select" class="theme-select" onchange="applyTheme(this.value)">
        <option value="carbon">Carbon Edge</option>
        <option value="executive">Executive Edge</option>
        <option value="editorial">Warm Editorial</option>
        <option value="meridian">Meridian Dark</option>
        <option value="blueprint">Blueprint</option>
      </select>
      <div class="toolbar-actions">
        <button id="edu-toggle" class="btn-icon owner-only" onclick="toggleEducation()" title="Education excluded from PDF">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3L1 9l4 2.18v6L12 21l7-3.82v-6l2-1.09V17h2V9L12 3zm6.82 6L12 12.72 5.18 9 12 5.28 18.82 9zM17 15.99l-5 2.73-5-2.73v-3.72L12 15l5-2.73v3.72z"/></svg>
        </button>
        <button class="btn btn-ghost" onclick="downloadJSON()">↓ JSON</button>
        <button class="btn btn-ghost" onclick="printPDF()">⎙ Print</button>
        <button class="btn btn-primary" onclick="downloadPDF()">↓ PDF</button>
      </div>
      <button id="menu-toggle" onclick="toggleMenu()" aria-label="Menu">☰</button>
    </div>
  </div>

  <div id="mobile-menu">
    <button class="btn btn-ghost" onclick="downloadJSON();toggleMenu()">↓ Download JSON</button>
    <button class="btn btn-ghost" onclick="printPDF();toggleMenu()">⎙ Print / PDF</button>
    <button class="btn btn-primary" onclick="downloadPDF();toggleMenu()">↓ Download PDF</button>
  </div>

  <nav id="section-nav" aria-label="Resume sections">
    <a href="#section-summary">Profile</a>
    <a href="#section-experience">Experience</a>
    <a href="#section-skills">Skills</a>
    <a href="#section-education">Education</a>
    <a href="#section-certifications">Certs</a>
    <a href="#section-ai">AI Practice</a>
  </nav>

  <div id="page-wrap">
    <div id="resume">
      <div id="loading">Loading resume content…</div>
    </div>
  </div>

  <script>
    // ── Theme system ──────────────────────────────────────────────────────────────

    const THEMES = {
      carbon: {
        name: 'Carbon Edge',
        attr: 'carbon',
        fonts: 'https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap',
        colors: { INK: '#111827', INKL: '#374151', INKM: '#6b7280', ACC: '#0d7490', RULE: '#4b5563', JOBRULE: '#d1d5db' }
      },
      executive: {
        name: 'Executive Edge',
        attr: 'executive',
        fonts: 'https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,600;0,700;1,400&display=swap',
        colors: { INK: '#0f1923', INKL: '#374151', INKM: '#6b7280', ACC: '#1e3a5f', RULE: '#94a3b8', JOBRULE: '#d1d9e0' }
      },
      editorial: {
        name: 'Warm Editorial',
        attr: 'editorial',
        fonts: 'https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap',
        colors: { INK: '#1a1a1a', INKL: '#4a4a4a', INKM: '#888888', ACC: '#8b6f47', RULE: '#c8b99a', JOBRULE: '#e8e0d0' }
      },
      meridian: {
        name: 'Meridian Dark',
        attr: 'meridian',
        fonts: 'https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;600&display=swap',
        colors: { INK: '#e6edf3', INKL: '#c9d1d9', INKM: '#8b949e', ACC: '#58a6ff', RULE: '#30363d', JOBRULE: '#21262d' }
      },
      blueprint: {
        name: 'Blueprint',
        attr: 'blueprint',
        fonts: 'https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600&display=swap',
        colors: { INK: '#0f172a', INKL: '#1e3a5f', INKM: '#64748b', ACC: '#2563eb', RULE: '#bfdbfe', JOBRULE: '#eff6ff' }
      }
    };

    let currentTheme = 'carbon';

    function applyTheme(key) {
      if (!THEMES[key]) return;
      currentTheme = key;
      const t = THEMES[key];
      document.documentElement.setAttribute('data-theme', t.attr);
      document.getElementById('gfonts-link').href = t.fonts;
      localStorage.setItem('resume-theme', key);
      const sel = document.getElementById('theme-select');
      if (sel) sel.value = key;
    }

    let includeEducation = false;

    function initOwnerControls() {
      const params = new URLSearchParams(window.location.search);
      if (params.get('owner') === '1') {
        localStorage.setItem('resume-owner-controls', '1');
        window.history.replaceState({}, '', window.location.pathname + window.location.hash);
      }
      if (localStorage.getItem('resume-owner-controls') === '1') {
        document.body.classList.add('owner-mode');
      }
    }

    function syncEducationState() {
      const btn = document.getElementById('edu-toggle');
      if (btn) {
        btn.classList.toggle('active', includeEducation);
        btn.title = includeEducation ? 'Include Education in PDF' : 'Education excluded from PDF';
      }
      const section = document.getElementById('section-education');
      if (section) section.style.display = includeEducation ? '' : 'none';
      document.querySelectorAll('a[href="#section-education"]').forEach(link => {
        link.style.display = includeEducation ? '' : 'none';
      });
    }

    function toggleEducation() {
      includeEducation = !includeEducation;
      syncEducationState();
    }

    function toggleMenu() {
      document.getElementById('mobile-menu').classList.toggle('open');
    }

    document.addEventListener('click', (e) => {
      if (!e.target.closest('#menu-toggle') && !e.target.closest('#mobile-menu')) {
        document.getElementById('mobile-menu').classList.remove('open');
      }
    });

    // ── Section nav: IntersectionObserver for active highlighting ─────────────────

    function initSectionNav() {
      const links = Array.from(document.querySelectorAll('#section-nav a'));
      if (!links.length) return;

      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const id = '#' + entry.target.id;
            links.forEach(a => a.classList.toggle('active', a.getAttribute('href') === id));
            const active = document.querySelector(`#section-nav a[href="${id}"]`);
            if (active) active.scrollIntoView({ inline: 'nearest', block: 'nearest' });
          }
        });
      }, { rootMargin: '-48px 0px -55% 0px', threshold: 0 });

      links.forEach(a => {
        const target = document.querySelector(a.getAttribute('href'));
        if (target) observer.observe(target);
      });
    }

    // ── Load JSON and render ──────────────────────────────────────────────────────

    const JSON_FILE = 'resume-content.json';
    let RESUME_DATA = null;

    async function loadResume() {
      let data;
      try {
        const res = await fetch(JSON_FILE);
        if (!res.ok) throw new Error('fetch failed');
        data = await res.json();
      } catch (e) {
        data = EMBEDDED_DATA;
      }
      RESUME_DATA = data;
      render(data);
      syncEducationState();
      initSectionNav();
    }

    function render(d) {
      const resume = document.getElementById('resume');
      resume.innerHTML = `
    ${renderHeader(d.meta)}
    ${renderSummary(d.summary)}
    ${renderExperience(d.experience)}
    ${renderSkills(d.skills)}
    ${renderEducation(d.education)}
    ${renderCertifications(d.certifications)}
    ${renderAIPractitioner(d.aiPractitioner)}
  `;
    }

    function renderHeader(m) {
      return `
    <div id="header">
      <div id="header-left">
        <h1>${m.name}</h1>
        <div class="title-tag">${m.title}</div>
      </div>
      <div id="header-right">
        <div>${m.email}</div>
        <div>${m.phone}</div>
        <div>${m.location}</div>
        <div><a href="${m.linkedinUrl}" target="_blank">${m.linkedin}</a></div>
      </div>
    </div>
  `;
    }

    function renderSummary(text) {
      return `
    <div class="section" id="section-summary">
      <div class="section-label">
        <h2>Profile</h2>
        <div class="section-divider"></div>
      </div>
      <div class="section-body">
        <p class="summary-text">${text}</p>
      </div>
    </div>
  `;
    }

    function renderExperience(jobs) {
      const lastHsaIndex = jobs.reduce((lastIndex, job, index) =>
        job.company.toLowerCase().includes('hsa bank') ? index : lastIndex, -1
      );

      const jobsHTML = jobs.map((j, index) => {
        const jobHeader = `
      <div class="job-header">
        <div class="job-company">${j.company}</div>
        <div class="job-period">${j.period}</div>
      </div>
    `;
        const jobTitle = `<div class="job-title">${j.title}</div>`;
        const bulletList = `
      <ul class="job-bullets">
        ${j.bullets.map(b => b.startsWith('##')
          ? `<li class="bullet-heading">${b.slice(2).trim()}</li>`
          : `<li>${b}</li>`
        ).join('')}
      </ul>
    `;

        if (lastHsaIndex !== -1 && index > lastHsaIndex) {
          return `
    <details class="job job-collapsible">
      <summary class="job-summary">
        ${jobHeader}
        ${jobTitle}
      </summary>
      ${bulletList}
    </details>
  `;
        }

        return `
    <div class="job">
      ${jobHeader}
      ${jobTitle}
      ${bulletList}
    </div>
  `;
      }).join('');

      return `
    <div class="section" id="section-experience">
      <div class="section-label">
        <h2>Experience</h2>
        <div class="section-divider"></div>
      </div>
      <div class="section-body">
        ${jobsHTML}
      </div>
    </div>
  `;
    }

    function renderSkills(skills) {
      const rows = skills.map(s => `
    <div class="skill-row">
      <div class="skill-cat">${s.category}</div>
      <div class="skill-items">
        ${s.items.map(i => `<span class="skill-chip">${i}</span>`).join('')}
      </div>
    </div>
  `).join('');

      return `
    <div class="section" id="section-skills">
      <div class="section-label">
        <h2>Skills</h2>
        <div class="section-divider"></div>
      </div>
      <div class="section-body">
        <div class="skills-grid">${rows}</div>
      </div>
    </div>
  `;
    }

    function renderCertifications(certs) {
      const groups = certs.map(c => `
    <div class="cert-group">
      <div class="cert-issuer">${c.issuer}</div>
      <ul class="cert-items">
        ${c.items.map(i => `<li>${i}</li>`).join('')}
      </ul>
    </div>
  `).join('');

      return `
    <div class="section" id="section-certifications">
      <div class="section-label">
        <h2>Certifications</h2>
        <div class="section-divider"></div>
      </div>
      <div class="section-body">
        ${groups}
      </div>
    </div>
  `;
    }

    function renderAIPractitioner(section) {
      if (!section) return '';
      const bullets = section.bullets.map(b => {
        const colon = b.indexOf(':');
        if (colon > 0 && colon < 35) {
          return `<li><strong>${b.slice(0, colon + 1)}</strong>${b.slice(colon + 1)}</li>`;
        }
        return `<li>${b}</li>`;
      }).join('');
      return `
    <div class="section" id="section-ai">
      <div class="section-label">
        <h2>AI Practice</h2>
        <div class="section-divider"></div>
      </div>
      <div class="section-body">
        ${section.intro ? `<p class="practitioner-intro">${section.intro}</p>` : ''}
        <ul class="job-bullets">${bullets}</ul>
      </div>
    </div>
  `;
    }

    function renderEducation(education) {
      if (!education || !education.length) return '';
      const entries = education.map(e => `
    <div class="edu-entry">
      <div class="edu-institution">${e.institution}</div>
      <div class="edu-detail">${e.degree} &mdash; ${e.location}, ${e.year}</div>
    </div>
  `).join('');
      return `
    <div class="section" id="section-education">
      <div class="section-label">
        <h2>Education</h2>
        <div class="section-divider"></div>
      </div>
      <div class="section-body">
        ${entries}
      </div>
    </div>
  `;
    }

    // ── PDF export ────────────────────────────────────────────────────────────────

    function downloadPDF() {
      if (!RESUME_DATA) return;
      const d = RESUME_DATA;
      const btn = document.querySelector('#toolbar .btn-primary');
      if (btn) { btn.disabled = true; btn.innerHTML = 'Generating…'; }

      try {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ unit: 'pt', format: 'a4' });

        const PW = 595.28, PH = 841.89;
        const ML = 36, MR = 36, MT = 40, MB = 36;
        const LBL_W = 90, GAP = 14;
        const BODY_X = ML + LBL_W + GAP;
        const BODY_W = PW - MR - BODY_X;
        const CAT_COL = 130;

        const h2r = h => [parseInt(h.slice(1, 3), 16), parseInt(h.slice(3, 5), 16), parseInt(h.slice(5, 7), 16)];
        const tc = h => doc.setTextColor(...h2r(h));
        const dc = h => doc.setDrawColor(...h2r(h));
        const { INK, INKL, INKM, ACC, RULE, JOBRULE } = THEMES[currentTheme].colors;

        let y = MT;

        const newPage = () => { doc.addPage(); y = MT; };
        const need = (h) => { if (y + h > PH - MB) newPage(); };

        const lbl = (text) => {
          doc.setFont('helvetica', 'bold'); doc.setFontSize(7); tc(ACC);
          doc.text(text.toUpperCase(), ML + LBL_W, y + 7, { align: 'right' });
          dc(RULE); doc.setLineWidth(0.4);
          doc.line(ML + LBL_W - 22, y + 10, ML + LBL_W, y + 10);
        };

        // HEADER
        doc.setFont('times', 'bold'); doc.setFontSize(30); tc(INK);
        doc.text(d.meta.name, ML, y + 28);

        doc.setFont('helvetica', 'bold'); doc.setFontSize(7.5); tc(ACC);
        doc.text(d.meta.title, ML, y + 42);

        doc.setFont('helvetica', 'normal'); doc.setFontSize(9); tc(INKL);
        [d.meta.email, d.meta.phone, d.meta.location, d.meta.linkedin].forEach((v, i) => {
          doc.text(v, PW - MR, y + 10 + i * 12.5, { align: 'right' });
        });
        y += 54;
        dc(RULE); doc.setLineWidth(1.5); doc.line(ML, y, PW - MR, y);
        y += 18;

        // PROFILE
        lbl('Profile');
        doc.setFont('helvetica', 'italic'); doc.setFontSize(9); tc(INKL);
        doc.splitTextToSize(d.summary, BODY_W).forEach(line => {
          doc.text(line, BODY_X, y + 9); y += 13;
        });
        y += 14;

        // EXPERIENCE
        need(60); lbl('Experience');
        d.experience.forEach((job, idx) => {
          if (idx > 0) {
            need(50);
            dc(JOBRULE); doc.setLineDashPattern([1.5, 1.5], 0); doc.setLineWidth(0.4);
            doc.line(BODY_X, y, PW - MR, y); doc.setLineDashPattern([], 0);
            y += 10;
          }

          doc.setFont('times', 'bold'); doc.setFontSize(13); tc(INK);
          doc.text(job.company, BODY_X, y + 10);
          doc.setFont('helvetica', 'normal'); doc.setFontSize(8.5); tc(INKM);
          doc.text(job.period, PW - MR, y + 10, { align: 'right' });
          y += 15;

          doc.setFont('helvetica', 'bold'); doc.setFontSize(7.5); tc(ACC);
          doc.text(job.title.toUpperCase(), BODY_X, y + 7);
          y += 13;

          doc.setFont('helvetica', 'normal'); doc.setFontSize(9); tc(INKL);
          job.bullets.forEach(b => {
            if (b.startsWith('##')) {
              y += 4;
              doc.setFont('helvetica', 'bold'); doc.setFontSize(7.5); tc(INK);
              doc.text(b.slice(2).trim().toUpperCase(), BODY_X, y + 7);
              y += 13;
              return;
            }
            doc.setFont('helvetica', 'normal'); doc.setFontSize(9); tc(INKL);
            const lines = doc.splitTextToSize(b, BODY_W - 14);
            need(lines.length * 13 + 3);
            tc(RULE); doc.text('—', BODY_X, y + 9);
            tc(INKL);
            lines.forEach((l, li) => { doc.text(l, BODY_X + 14, y + 9 + li * 13); });
            y += lines.length * 13 + 3;
          });
          y += 8;
        });

        // SKILLS
        need(30); y += 4; lbl('Skills');
        d.skills.forEach(sg => {
          need(20);
          doc.setFont('helvetica', 'bold'); doc.setFontSize(7.5); tc(INKM);
          const catLines = doc.splitTextToSize(sg.category.toUpperCase(), CAT_COL);
          catLines.forEach((cl, ci) => { doc.text(cl, BODY_X, y + 8 + ci * 10); });

          doc.setFont('helvetica', 'normal'); doc.setFontSize(9); tc(INKL);
          const itemLines = doc.splitTextToSize(sg.items.join('  ·  '), BODY_W - CAT_COL - 6);
          itemLines.forEach((il, ii) => { doc.text(il, BODY_X + CAT_COL + 6, y + 8 + ii * 12); });

          y += Math.max(catLines.length * 10, itemLines.length * 12) + 6;
        });

        // EDUCATION
        if (includeEducation && d.education && d.education.length) {
          need(30); y += 4; lbl('Education');
          d.education.forEach(edu => {
            need(28);
            doc.setFont('helvetica', 'bold'); doc.setFontSize(7.5); tc(INKM);
            doc.text(edu.institution.toUpperCase(), BODY_X, y + 8);
            doc.setFont('helvetica', 'normal'); doc.setFontSize(9.5); tc(INKL);
            doc.text(`${edu.degree}  —  ${edu.location}, ${edu.year}`, BODY_X, y + 20);
            y += 30;
          });
        }

        // CERTIFICATIONS
        need(30); y += 4; lbl('Certifications');
        d.certifications.forEach(cert => {
          need(20);
          doc.setFont('helvetica', 'bold'); doc.setFontSize(7.5); tc(INKM);
          doc.text(cert.issuer.toUpperCase(), BODY_X, y + 8);
          y += 13;
          cert.items.forEach(item => {
            need(14);
            doc.setFont('helvetica', 'normal'); doc.setFontSize(9.5); tc(INKL);
            doc.text('·  ' + item, BODY_X + 4, y + 9);
            y += 13;
          });
          y += 6;
        });

        // AI PRACTITIONER
        if (d.aiPractitioner) {
          const ai = d.aiPractitioner;
          need(30); y += 4; lbl('AI Practice');
          if (ai.intro) {
            doc.setFont('helvetica', 'italic'); doc.setFontSize(9); tc(INKL);
            doc.splitTextToSize(ai.intro, BODY_W).forEach(line => {
              doc.text(line, BODY_X, y + 9); y += 13;
            });
            y += 6;
          }
          ai.bullets.forEach(b => {
            const colon = b.indexOf(':');
            const hasLabel = colon > 0 && colon < 35;
            const label = hasLabel ? b.slice(0, colon + 1) : '';
            const rest = hasLabel ? b.slice(colon + 1).trim() : b;
            doc.setFont('helvetica', 'normal'); doc.setFontSize(9); tc(INKL);
            const lines = doc.splitTextToSize((hasLabel ? rest : b), BODY_W - 14);
            need(lines.length * 13 + 3);
            tc(RULE); doc.text('—', BODY_X, y + 9);
            if (hasLabel) {
              doc.setFont('helvetica', 'bold'); tc(INK);
              doc.text(label, BODY_X + 14, y + 9);
              const lw = doc.getTextWidth(label) + 3;
              doc.setFont('helvetica', 'normal'); tc(INKL);
              const firstLineRest = doc.splitTextToSize(rest, BODY_W - 14 - lw);
              doc.text(firstLineRest[0], BODY_X + 14 + lw, y + 9);
              if (firstLineRest.length > 1) {
                firstLineRest.slice(1).forEach((l, li) => {
                  doc.text(l, BODY_X + 14, y + 9 + (li + 1) * 13);
                });
              }
              y += firstLineRest.length * 13 + 3;
            } else {
              lines.forEach((l, li) => { doc.text(l, BODY_X + 14, y + 9 + li * 13); });
              y += lines.length * 13 + 3;
            }
          });
        }

        doc.save('Guillermo_Salas_Resume.pdf');

      } catch (err) {
        console.error('PDF generation failed:', err);
        alert('PDF generation failed. Use "Print" as a fallback.');
      } finally {
        if (btn) { btn.disabled = false; btn.innerHTML = '↓ PDF'; }
      }
    }

    function printPDF() {
      document.querySelectorAll('details.job-collapsible').forEach(d => d.setAttribute('open', ''));
      window.print();
    }

    // ── Download JSON ─────────────────────────────────────────────────────────────

    function downloadJSON() {
      if (!RESUME_DATA) return;
      const blob = new Blob([JSON.stringify(RESUME_DATA, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'Guillermo_Salas_Resume.json';
      a.click();
      URL.revokeObjectURL(url);
    }

    // ── Embedded fallback data ────────────────────────────────────────────────────

    const EMBEDDED_DATA = {
      "meta": {
        "name": "Guillermo Salas",
        "title": "EVP SOFTWARE ENGINEERING / CTO",
        "email": "gsalast@gmail.com",
        "phone": "+1-414-899-4450",
        "location": "Elm Grove, Wisconsin",
        "linkedin": "linkedin.com/in/guillermosalas",
        "linkedinUrl": "https://linkedin.com/in/guillermosalas"
      },
      "summary": "Technology executive and enterprise solutions architect who builds AI-augmented engineering organizations from the ground up. 20+ years progressing from hands-on cloud architecture and digital transformation delivery to leading multi-team engineering organizations—designing operating models, governance frameworks, and platform strategies that convert technical capability into measurable business outcomes. Career arc spans Fortune 500 consulting, regulated fintech platforms, enterprise SaaS modernization, and Healthcare IT at scale. Currently driving AI-first organizational transformation, global team architecture, and M&A integration within a PE-backed growth environment.",
      "experience": [
        {
          "company": "Experity",
          "title": "VP, Software Engineering and Product Development",
          "period": "Mar 2023 – Present",
          "bullets": [
            "## AI-First Organizational Transformation",
            "Championed enterprise AI adoption against initial executive resistance—delivering a documented 3–4x increase in meaningful code output (500K → 1.5–2M lines) with 30%+ productivity improvement. Conceived and led the organization's first AI Hackathon, designed the AI Development Framework (Developer Directs → AI Executes → Developer Validates), and created the AI-Native PDLC—a 5-stage framework feeding curated context to both engineers and AI agents.",
            "Built an AI Governance Architecture satisfying HIPAA-adjacent compliance: usage policies, security guardrails, cost governance, and audit protocols—converting ad-hoc experiments into governed, repeatable pipelines across the full SDLC.",
